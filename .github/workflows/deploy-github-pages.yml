# Publishes static files to the gh-pages branch (reliable; avoids deploy-pages artifact API).
# After first success: Repo → Settings → Pages → Build: Deploy from branch → gh-pages / (root)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html vercel.json _site/
          cp DELEGATE_DATA_INGESTION_E2E.md _site/
          if [ -d assets ]; then cp -r assets _site/; fi

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          publish_branch: gh-pages
          force_orphan: true
